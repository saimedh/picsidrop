services:
  # ─── Picsi Drop Backend API ────────────────────────────────────────
  - type: web
    name: picsidrop-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render Dashboard → Environment tab:
      - key: DATABASE_URL
        sync: false     # e.g. libsql://picsidrop-db-<your-org>.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false     # Get from: turso db tokens create picsidrop-db
